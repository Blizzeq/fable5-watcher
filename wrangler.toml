name = "fable5-watcher"
main = "src/index.js"
compatibility_date = "2026-06-01"

# Cron Trigger — co 60 sekund
[triggers]
crons = ["* * * * *"]

# Nie-sekretna zmienna: Twoje Discord User ID (Developer Mode → Copy User ID).
# Wstaw tutaj swoje ID przed deployem.
[vars]
DISCORD_USER_ID = "WSTAW_SWOJE_DISCORD_USER_ID"

# Pamięć stanu (poprzedni status). Uzupełnij `id` po komendzie:
#   wrangler kv namespace create FABLE_STATE
[[kv_namespaces]]
binding = "FABLE_STATE"
id = "WSTAW_KV_NAMESPACE_ID"

# Sekrety (NIE trzymaj ich w tym pliku) — ustaw komendami:
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put DISCORD_WEBHOOK_URL
